  <meta charset="utf-8" />

  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 560px; margin: auto; }
    h2 { color: #2c3e50; text-align: center; font-size: 24px; margin-top: 0; }
    select { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #ddd; margin: 10px 0; }
    .btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; font-weight: bold; }
    .btn.secondary { background:#34495e; margin-top: 10px; }
    .status-badge { text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    .live { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .warn { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .err  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .result-box { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; text-align: center; }
    /* Change .good to .positive and .bad to .negative */
.positive { background: #d4edda; border: 2px solid #c3e6c9; color: #155724; }
.negative { background: #f8d7da; border: 2px solid #f5c6cb; color: #721c24; }
.neutral  { background: #fff3cd; border: 2px solid #ffeeba; color: #856404; }
    .star-info { font-size: 18px; margin-bottom: 5px; font-weight: bold; }
    small { display:block; text-align:center; color: #7f8c8d; }
    .meta { margin-top: 6px; font-size: 14px; }
    .kv { display:flex; justify-content:space-between; gap:12px; }
    .kv b { color:#2c3e50; }

<body>
  <div class="card">
    <h2>🌟 Tarabalam Now</h2>

    <div id="statusBanner" class="status-badge live">
      🛰️ <span id="statusText">Getting your location & sky data...</span>
    </div>

    <div style="text-align: center; margin-bottom: 16px;">
      <div class="star-info">
        Current Star:
        <span id="todayStarDisplay" style="color:#d35400;">Loading...</span>
      </div>
      <small id="metaDisplay"></small>
      <small id="endDisplay" class="meta"></small>
    </div>

    <label style="font-weight: bold; display: block; margin-bottom: 5px;">Select Your Birth Star:</label>
    <select id="userStar"></select>

    <button class="btn" id="checkBtn" type="button">Check My Luck Now</button>
    <button class="btn secondary" id="refreshBtn" type="button">Refresh Current Star</button>

    <div id="result" class="result-box">
      <div id="resultIcon" style="font-size: 50px; margin-bottom: 10px;"></div>
      <h3 id="taraName" style="margin: 0; font-size: 26px;"></h3>
      <p id="taraDesc" style="font-size: 18px; line-height: 1.4;"></p>
    </div>
  </div>

  <script>
    const nakshatras = [
      "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha",
      "Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
      "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"
    ];

    const taraData = {
    1: { 
        name: "Janma Tara", 
        type: "neutral", 
        icon: "⚠️", 
        desc: `This is your Moon’s birth Nakshatra and represents your mind, health, and core life experiences. Results are deeply personal and strongly felt.<br><br>
        <b>Do’s:</b> Focus on self-care, health routines, reflection, and spiritual practices.<br>
        <b>Don’ts:</b> Avoid risky ventures, emotional confrontations, and overexertion.` 
    },
    2: { 
        name: "Sampat Tara", 
        type: "positive", 
        icon: "💰", 
        desc: `The "Wealth" star. This period brings prosperity, financial gains, and material comfort. It is highly auspicious for new beginnings.<br><br>
        <b>Do’s:</b> Invest money, start new business ventures, and sign important contracts.<br>
        <b>Don’ts:</b> Avoid being pessimistic or letting profitable opportunities slip away.` 
    },
    3: { 
        name: "Vipat Tara", 
        type: "negative", 
        icon: "🚫", 
        desc: `The "Danger" star. This period can bring unexpected hurdles, mishaps, or a sense of unease. Caution is the keyword here.<br><br>
        <b>Do’s:</b> Maintain a low profile, double-check your work, and practice patience.<br>
        <b>Don’ts:</b> Avoid major travel, surgery, or starting high-stakes projects.` 
    },
    4: { 
        name: "Kshema Tara", 
        type: "positive", 
        icon: "🛡️", 
        desc: `The "Well-being" star. This brings protection, comfort, and steady progress. It’s a great time for family and home life.<br><br>
        <b>Do’s:</b> Reconnect with family, buy household items, and focus on long-term security.<br>
        <b>Don’ts:</b> Avoid neglect of duties or taking your current stability for granted.` 
    },
    5: { 
        name: "Pratyari Tara", 
        type: "negative", 
        icon: "⚔️", 
        desc: `The "Opposition" star. You may face obstacles, enemies, or disagreements. It’s a time when others might challenge your authority.<br><br>
        <b>Do’s:</b> Practice diplomacy, keep your secrets safe, and stay calm under pressure.<br>
        <b>Don’ts:</b> Avoid unnecessary arguments or making new enemies.` 
    },
    6: { 
        name: "Sadhaka Tara", 
        type: "positive", 
        icon: "🎯", 
        desc: `The "Success" star. This is one of the most powerful Taras for achieving goals and gaining spiritual insights.<br><br>
        <b>Do’s:</b> Focus on difficult tasks, meditate, and push for the final completion of projects.<br>
        <b>Don’ts:</b> Avoid laziness; the energy of this star rewards effort and focus.` 
    },
    7: { 
        name: "Vadha Tara", 
        type: "negative", 
        icon: "💀", 
        desc: `The "Danger to Life" star. This is traditionally considered the most difficult Tara. It represents extreme obstacles and exhaustion.<br><br>
        <b>Do’s:</b> Rest, perform spiritual protection practices, and avoid all major risks.<br>
        <b>Don’ts:</b> Do NOT start anything of vital importance. Avoid major life changes today.` 
    },
    8: { 
        name: "Mitra Tara", 
        type: "positive", 
        icon: "🤝", 
        desc: `The "Friend" star. This brings harmony, social success, and pleasant interactions. A great time for networking.<br><br>
        <b>Do’s:</b> Meet friends, ask for favors, and engage in social gatherings.<br>
        <b>Don’ts:</b> Avoid isolation; you will find your best results through cooperation.` 
    },
    0: { 
        name: "Ati-Mitra Tara", 
        type: "positive", 
        icon: "🌟", 
        desc: `The "Great Friend" star. This brings exceptional support and deep happiness. It is a highly beneficial and lucky period.<br><br>
        <b>Do’s:</b> Launch your most important ideas, seek mentorship, and express gratitude.<br>
        <b>Don’ts:</b> Avoid being arrogant; stay humble to keep this positive flow moving.` 
    }
};

    let currentStarIndex = null;

    // 1. Instant Dropdown Population
    const select = document.getElementById('userStar');
    nakshatras.forEach((n, i) => {
        let opt = document.createElement('option');
        opt.value = i + 1;
        opt.textContent = n;
        select.appendChild(opt);
    });

    // 2. Robust API Call with Fallback
    async function fetchStar() {
    const statusText = document.getElementById('statusText');
    const starDisplay = document.getElementById("todayStarDisplay");
    
    try {
        statusText.innerText = "Syncing with Sky Data...";
        
        // 1. Define the actual API URL
        const apiURL = `https://api.vedastro.org/api/PanchangInfo/GetPanchangData?Date=25/02/2026&Time=16:00&Latitude=23.17&Longitude=75.78&TimeZoneOffset=+05:30&Ayanamsha=Lahiri`;
        
        // 2. Wrap it in a reliable proxy (corsproxy.io is a great alternative)
        const proxyURL = `https://corsproxy.io/?${encodeURIComponent(apiURL)}`;

        // 3. Perform the fetch using the proxyURL
        const response = await fetch(proxyURL);
        
        if (!response.ok) throw new Error("Network response was not ok");
        
        const data = await response.json();
        
        // 4. Extract and Clean the Star Name
        // VedAstro usually returns MoonNakshatra.Name
        let rawStar = data.MoonNakshatra?.Name || data.MoonNakshatra || "";
        const apiStar = rawStar.replace(/\s/g, '').toLowerCase();
        
        currentStarIndex = nakshatras.findIndex(s => apiStar.includes(s.toLowerCase()));

        if (currentStarIndex !== -1) {
            starDisplay.innerText = nakshatras[currentStarIndex];
            statusText.innerText = "✓ Connected to Sky Data";
        } else {
            throw new Error("Star mapping failed");
        }

    } catch (error) {
        console.error("Fetch error:", error);
        statusText.innerText = "✖ Connection Busy. Using Default Sky.";
        
        // Fallback to Mrigashira (Index 4) for Feb 25th 4:00 PM
        currentStarIndex = 4; 
        starDisplay.innerText = nakshatras[currentStarIndex] + " (Est.)";
    }
}

    // 3. Calculation Logic
    document.getElementById("checkBtn").addEventListener("click", () => {
        if (currentStarIndex === null) return alert("Still loading sky data...");
        
        const birthStar = parseInt(select.value);
        const currentStar = currentStarIndex + 1;
        
        let diff = (currentStar - birthStar + 1);
        if (diff <= 0) diff += 27;
        
        const tara = taraData[diff % 9];
        const resDiv = document.getElementById('result');
        
        resDiv.style.display = 'block';
        resDiv.className = `result-box ${tara.type}`;
        document.getElementById('resultIcon').innerText = tara.icon;
        document.getElementById('taraName').innerText = tara.name;
        document.getElementById('taraDesc').innerText = tara.desc;
        resDiv.scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById("refreshBtn").addEventListener("click", fetchStar);

    // Initialize
    window.onload = fetchStar;
</script>
</body>
