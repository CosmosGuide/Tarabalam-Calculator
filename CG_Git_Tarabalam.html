<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarabalam Now</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 560px; margin: auto; }
    h2 { color: #2c3e50; text-align: center; font-size: 24px; margin-top: 0; }
    select { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #ddd; margin: 10px 0; }
    .btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; font-weight: bold; }
    .btn.secondary { background:#34495e; margin-top: 10px; }
    .status-badge { text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    .live { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .warn { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .err  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .result-box { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; text-align: center; }
    .good { background: #d4edda; border: 2px solid #c3e6c9; color: #155724; }
    .bad { background: #f8d7da; border: 2px solid #f5c6cb; color: #721c24; }
    .neutral { background: #fff3cd; border: 2px solid #ffeeba; color: #856404; }
    .star-info { font-size: 18px; margin-bottom: 5px; font-weight: bold; }
    small { display:block; text-align:center; color: #7f8c8d; }
    .meta { margin-top: 6px; font-size: 14px; }
    .kv { display:flex; justify-content:space-between; gap:12px; }
    .kv b { color:#2c3e50; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🌟 Tarabalam Now</h2>

    <div id="statusBanner" class="status-badge live">
      🛰️ <span id="statusText">Getting your location & sky data...</span>
    </div>

    <div style="text-align: center; margin-bottom: 16px;">
      <div class="star-info">
        Current Star:
        <span id="todayStarDisplay" style="color:#d35400;">Loading...</span>
      </div>
      <small id="metaDisplay"></small>
      <small id="endDisplay" class="meta"></small>
    </div>

    <label style="font-weight: bold; display: block; margin-bottom: 5px;">Select Your Birth Star:</label>
    <select id="userStar"></select>

    <button class="btn" id="checkBtn" type="button">Check My Luck Now</button>
    <button class="btn secondary" id="refreshBtn" type="button">Refresh Current Star</button>

    <div id="result" class="result-box">
      <div id="resultIcon" style="font-size: 50px; margin-bottom: 10px;"></div>
      <h3 id="taraName" style="margin: 0; font-size: 26px;"></h3>
      <p id="taraDesc" style="font-size: 18px; line-height: 1.4;"></p>
    </div>
  </div>

  <script>
    const nakshatras = [
      "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha",
      "Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
      "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"
    ];

    const taraData = {
      1: { name: "Janma Tara", type: "neutral", icon: "⚠️", desc: "Body/Health focus. Stay calm and keep things routine." },
      2: { name: "Sampat Tara", type: "good", icon: "💰", desc: "Wealth & Success. Very lucky for money matters!" },
      3: { name: "Vipat Tara", type: "bad", icon: "⛔", desc: "Obstacles. Be careful with travel or arguments today." },
      4: { name: "Kshema Tara", type: "good", icon: "🛡️", desc: "Safe & Secure. A protected day. Good for family." },
      5: { name: "Pratyari Tara", type: "bad", icon: "🚧", desc: "Opposition. Stay patient and avoid conflict." },
      6: { name: "Sadhana Tara", type: "good", icon: "🎯", desc: "Achievement. Your hard work will pay off today!" },
      7: { name: "Naidhana Tara", type: "bad", icon: "⚠️", desc: "Cautionary. Avoid major new activities. Rest." },
      8: { name: "Mitra Tara", type: "good", icon: "👥", desc: "Friendly Day. Good for meeting friends." },
      0: { name: "Ati-Mitra Tara", type: "good", icon: "⭐", desc: "Best Friend. Highly auspicious! Everything moves in your favor." }
    };

    // --- DOM ELEMENTS ---
    const select = document.getElementById('userStar');
    const statusText = document.getElementById('statusText');
    const starDisplay = document.getElementById("todayStarDisplay");

    // --- INITIALIZE DROPDOWN (Runs instantly) ---
    function initDropdown() {
      select.innerHTML = ""; // Clear existing
      nakshatras.forEach((n, i) => {
        let opt = document.createElement('option');
        opt.value = i + 1;
        opt.textContent = n;
        select.appendChild(opt);
      });
    }

    // --- API CORE ---
    async function fetchNakshatraAt(dateObj, lat, lon) {
      const { dateStr, timeStr, tzOffset } = getDateTimeForApi(dateObj);
      const params = new URLSearchParams({
        Date: dateStr, Time: timeStr, Latitude: String(lat), Longitude: String(lon),
        TimeZoneOffset: tzOffset, Ayanamsha: "Lahiri"
      });

      const targetUrl = `https://api.vedastro.org/api/PanchangInfo/GetPanchangData?${params.toString()}`;
      // Using AllOrigins proxy - more reliable for JSON data
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error("Proxy Error");
      
      const wrapper = await res.json();
      const data = JSON.parse(wrapper.contents); // AllOrigins wraps the response in 'contents'

      const idx = nakshatras.findIndex(n => 
        data.MoonNakshatra.toLowerCase().replace(/\s/g, '').includes(n.toLowerCase().replace(/\s/g, ''))
      );
      
      if (idx === -1) throw new Error("Data Mismatch");
      return { idx };
    }

    // --- HELPERS (Same as before but cleaned) ---
    function getDateTimeForApi(d) {
      const pad = (n) => String(n).padStart(2, '0');
      const offsetMin = -d.getTimezoneOffset();
      const tz = `${offsetMin >= 0 ? '+' : '-'}${pad(Math.floor(Math.abs(offsetMin) / 60))}:${pad(Math.abs(offsetMin) % 60)}`;
      return { 
        dateStr: `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`, 
        timeStr: `${pad(d.getHours())}:${pad(d.getMinutes())}`, 
        tzOffset: tz 
      };
    }

    async function refresh() {
      try {
        statusText.innerText = "Connecting to sky data...";
        const lat = 23.1765, lon = 75.7885; // Defaulting to Ujjain for speed, can re-add geo later
        const result = await fetchNakshatraAt(new Date(), lat, lon);
        currentStarIndex = result.idx;
        starDisplay.innerText = nakshatras[currentStarIndex];
        statusText.innerText = "✓ System Ready";
      } catch (e) {
        statusText.innerText = "✖ Connection Error. Try again.";
        console.error(e);
      }
    }

    // --- EVENTS ---
    document.getElementById("checkBtn").addEventListener("click", () => {
      if (typeof currentStarIndex === 'undefined') return alert("Still loading sky data...");
      const birthStar = parseInt(select.value);
      const currentStar = currentStarIndex + 1;
      let diff = (currentStar - birthStar + 1);
      if (diff <= 0) diff += 27;
      const tara = taraData[diff % 9];

      const resDiv = document.getElementById('result');
      resDiv.style.display = 'block';
      resDiv.className = `result-box ${tara.type}`;
      document.getElementById('resultIcon').innerText = tara.icon;
      document.getElementById('taraName').innerText = tara.name;
      document.getElementById('taraDesc').innerText = tara.desc;
    });

    // Start everything
    initDropdown();
    refresh();
</script>
</body>
</html>
