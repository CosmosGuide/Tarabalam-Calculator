    .bad { background: #f8d7da; border: 2px solid #f5c6cb; color: #721c24; }
    .neutral { background: #fff3cd; border: 2px solid #ffeeba; color: #856404; }
    .star-info { font-size: 18px; margin-bottom: 5px; font-weight: bold; }
    small { display:block; text-align:center; color: #7f8c8d; }
    .meta { margin-top: 6px; font-size: 14px; }
    .kv { display:flex; justify-content:space-between; gap:12px; }

      <p id="taraDesc" style="font-size: 18px; line-height: 1.4;"></p>
    </div>
  </div>

  <script>
    const nakshatras = [
      "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha",
      "Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
      "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"
    ];

    const taraData = {
      1: { name: "Janma Tara", type: "neutral", icon: "⚠️", desc: "Focus on health and routine." },
      2: { name: "Sampat Tara", type: "good", icon: "💰", desc: "Wealth & Success. Very lucky!" },
      3: { name: "Vipat Tara", type: "bad", icon: "⛔", desc: "Obstacles. Be cautious today." },
      4: { name: "Kshema Tara", type: "good", icon: "🛡️", desc: "Safe & Secure. Good for family." },
      5: { name: "Pratyari Tara", type: "bad", icon: "🚧", desc: "Opposition. Stay patient." },
      6: { name: "Sadhana Tara", type: "good", icon: "🎯", desc: "Achievement. Great for goals!" },
      7: { name: "Naidhana Tara", type: "bad", icon: "⚠️", desc: "Highly Cautionary. Rest today." },
      8: { name: "Mitra Tara", type: "good", icon: "👥", desc: "Friendly Day. Good for social events." },
      0: { name: "Ati-Mitra Tara", type: "good", icon: "⭐", desc: "Highly auspicious! Best friend day." }
    };

    let currentStarIndex = null;

    // 1. Instant Dropdown Population
    const select = document.getElementById('userStar');
    nakshatras.forEach((n, i) => {
        let opt = document.createElement('option');
        opt.value = i + 1;
        opt.textContent = n;
        select.appendChild(opt);
    });

    // 2. Robust API Call with Fallback
    async function fetchStar() {
        const statusText = document.getElementById('statusText');
        const starDisplay = document.getElementById("todayStarDisplay");
        
        try {
            statusText.innerText = "Syncing with Sky Data...";
            
            // Using a cleaner Proxy approach
            const apiURL = `https://api.vedastro.org/api/PanchangInfo/GetPanchangData?Date=25/02/2026&Time=15:30&Latitude=23.17&Longitude=75.78&TimeZoneOffset=+05:30&Ayanamsha=Lahiri`;
            const proxyURL = `https://cors-anywhere.herokuapp.com/${apiURL}`; 
            
            // Try fetching from a public reliable proxy or directly
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}`);
            
            if (!response.ok) throw new Error("Network response was not ok");
            
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);
            
            // Match the star name from API to our list
            const apiStar = data.MoonNakshatra.replace(/\s/g, '').toLowerCase();
            currentStarIndex = nakshatras.findIndex(s => apiStar.includes(s.toLowerCase()));

            if (currentStarIndex !== -1) {
                starDisplay.innerText = nakshatras[currentStarIndex];
                statusText.innerText = "✓ Connected to Sky Data";
            } else {
                throw new Error("Star mapping failed");
            }

        } catch (error) {
            console.error("Fetch error:", error);
            statusText.innerText = "✖ Connection Busy. Using Default Sky.";
            // Fallback: If API fails, we set a default so the user can still use the app
            currentStarIndex = 10; // Defaulting to Magha for now
            starDisplay.innerText = nakshatras[currentStarIndex] + " (Est.)";
        }
    }

    // 3. Calculation Logic
    document.getElementById("checkBtn").addEventListener("click", () => {
        if (currentStarIndex === null) return alert("Still loading sky data...");
        
        const birthStar = parseInt(select.value);
        const currentStar = currentStarIndex + 1;
        
        let diff = (currentStar - birthStar + 1);
        if (diff <= 0) diff += 27;
        
        const tara = taraData[diff % 9];
        const resDiv = document.getElementById('result');
        
        resDiv.style.display = 'block';
        resDiv.className = `result-box ${tara.type}`;
        document.getElementById('resultIcon').innerText = tara.icon;
        document.getElementById('taraName').innerText = tara.name;
        document.getElementById('taraDesc').innerText = tara.desc;
        resDiv.scrollIntoView({ behavior: 'smooth' });
    });

    document.getElementById("refreshBtn").addEventListener("click", fetchStar);

    // Initialize
    window.onload = fetchStar;
</script>
</body>
