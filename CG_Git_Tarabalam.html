<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarabalam Now</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 560px; margin: auto; }
    h2 { color: #2c3e50; text-align: center; font-size: 24px; margin-top: 0; }
    select { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #ddd; margin: 10px 0; }
    .btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; font-weight: bold; }
    .btn.secondary { background:#34495e; margin-top: 10px; }
    .status-badge { text-align: center; padding: 10px; margin-bottom: 20px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    .live { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .warn { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .err  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .result-box { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; text-align: center; }
    .good { background: #d4edda; border: 2px solid #c3e6c9; color: #155724; }
    .bad { background: #f8d7da; border: 2px solid #f5c6cb; color: #721c24; }
    .neutral { background: #fff3cd; border: 2px solid #ffeeba; color: #856404; }
    .star-info { font-size: 18px; margin-bottom: 5px; font-weight: bold; }
    small { display:block; text-align:center; color: #7f8c8d; }
    .meta { margin-top: 6px; font-size: 14px; }
    .kv { display:flex; justify-content:space-between; gap:12px; }
    .kv b { color:#2c3e50; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🌟 Tarabalam Now</h2>

    <div id="statusBanner" class="status-badge live">
      🛰️ <span id="statusText">Getting your location & sky data...</span>
    </div>

    <div style="text-align: center; margin-bottom: 16px;">
      <div class="star-info">
        Current Star:
        <span id="todayStarDisplay" style="color:#d35400;">Loading...</span>
      </div>
      <small id="metaDisplay"></small>
      <small id="endDisplay" class="meta"></small>
    </div>

    <label style="font-weight: bold; display: block; margin-bottom: 5px;">Select Your Birth Star:</label>
    <select id="userStar"></select>

    <button class="btn" id="checkBtn" type="button">Check My Luck Now</button>
    <button class="btn secondary" id="refreshBtn" type="button">Refresh Current Star</button>

    <div id="result" class="result-box">
      <div id="resultIcon" style="font-size: 50px; margin-bottom: 10px;"></div>
      <h3 id="taraName" style="margin: 0; font-size: 26px;"></h3>
      <p id="taraDesc" style="font-size: 18px; line-height: 1.4;"></p>
    </div>
  </div>

  <script>
    const nakshatras = [
      "Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha",
      "Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha",
      "Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishta","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"
    ];

    const taraData = {
      1: { name: "Janma Tara", type: "neutral", icon: "⚠️", desc: "Body/Health focus. Stay calm, avoid heavy strain, and keep things routine." },
      2: { name: "Sampat Tara", type: "good", icon: "💰", desc: "Wealth & Success. Very lucky for money matters and starting good work!" },
      3: { name: "Vipat Tara", type: "bad", icon: "⛔", desc: "Obstacles. Be careful with travel or arguments today. Postpone big decisions." },
      4: { name: "Kshema Tara", type: "good", icon: "🛡️", desc: "Safe & Secure. A protected day. Good for family time and health." },
      5: { name: "Pratyari Tara", type: "bad", icon: "🚧", desc: "Opposition. Others might disagree with you. Stay patient and avoid conflict." },
      6: { name: "Sadhana Tara", type: "good", icon: "🎯", desc: "Achievement. Your hard work will pay off today. Great for getting things done!" },
      7: { name: "Naidhana Tara", type: "bad", icon: "⚠️", desc: "Highly Cautionary. Avoid any major new activity. Rest and stay safe." },
      8: { name: "Mitra Tara", type: "good", icon: "👥", desc: "Friendly Day. Good for meeting friends and happy conversations." },
      0: { name: "Ati-Mitra Tara", type: "good", icon: "⭐", desc: "Best Friend. Highly auspicious! Everything moves in your favor today." }
    };

    // Populate dropdown
    const select = document.getElementById('userStar');
    nakshatras.forEach((n, i) => select.options.add(new Option(n, i + 1)));

    // Ujjain fallback
    const FALLBACK = { lat: 23.1765, lon: 75.7885, label: "Ujjain, India" };

    function setStatus(kind, text) {
      const banner = document.getElementById('statusBanner');
      banner.className = "status-badge " + (kind === "live" ? "live" : kind === "warn" ? "warn" : "err");
      document.getElementById('statusText').innerText = text;
    }

    function normalize(s) {
      return String(s || "").toLowerCase().replace(/[\s\-_.]/g, '');
    }

    function findNakshatraIndex(apiValue) {
      const normApi = normalize(apiValue);
      if (!normApi) return -1;
      let idx = nakshatras.findIndex(n => normalize(n) === normApi);
      if (idx !== -1) return idx;
      idx = nakshatras.findIndex(n => normApi.includes(normalize(n)));
      return idx;
    }

    function prettyNow(d = new Date()) {
      return d.toLocaleString([], { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    // Build API Date/Time/TZ from a JS Date at the user's local timezone.
    // Note: when user is NOT in the target location timezone, this is still okay because we pass TimeZoneOffset explicitly.
    function getDateTimeForApi(dateObj) {
      const dd = String(dateObj.getDate()).padStart(2, '0');
      const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
      const yyyy = String(dateObj.getFullYear());
      const HH = String(dateObj.getHours()).padStart(2, '0');
      const MI = String(dateObj.getMinutes()).padStart(2, '0');

      const dateStr = `${dd}/${mm}/${yyyy}`;
      const timeStr = `${HH}:${MI}`;

      const offsetMin = -dateObj.getTimezoneOffset(); // minutes ahead of UTC
      const sign = offsetMin >= 0 ? "+" : "-";
      const abs = Math.abs(offsetMin);
      const oh = String(Math.floor(abs / 60)).padStart(2, "0");
      const om = String(abs % 60).padStart(2, "0");
      const tzOffset = `${sign}${oh}:${om}`;

      return { dateStr, timeStr, tzOffset };
    }

    async function getUserLocation({ timeoutMs = 8000 } = {}) {
      return new Promise((resolve) => {
        if (!navigator.geolocation) {
          resolve({ ...FALLBACK, acc: null, fallback: true });
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            lat: pos.coords.latitude,
            lon: pos.coords.longitude,
            acc: pos.coords.accuracy,
            label: "Your location",
            fallback: false
          }),
          () => resolve({ ...FALLBACK, acc: null, fallback: true }),
          { enableHighAccuracy: true, timeout: timeoutMs, maximumAge: 60_000 }
        );
      });
    }

    async function fetchNakshatraAt(dateObj, lat, lon) {
      const { dateStr, timeStr, tzOffset } = getDateTimeForApi(dateObj);

      const params = new URLSearchParams({
        Date: dateStr,
        Time: timeStr,
        Latitude: String(lat),
        Longitude: String(lon),
        TimeZoneOffset: tzOffset,
        Ayanamsha: "Lahiri"
      });

      const url = `https://api.vedastro.org/api/PanchangInfo/GetPanchangData?${params.toString()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      const idx = findNakshatraIndex(data?.MoonNakshatra);
      if (idx === -1) throw new Error(`Unknown MoonNakshatra: ${data?.MoonNakshatra}`);

      return { idx, raw: data };
    }

    // Compute end time by finding when nakshatra changes.
    // Strategy:
    // 1) Query now => idx0
    // 2) Expand forward until idx changes (or max horizon)
    // 3) Binary search in that window to find change moment to ~1 minute precision
    async function computeNakshatraEndTime(now, lat, lon, idx0) {
      const MAX_HOURS_LOOKAHEAD = 36;   // nakshatra always changes within this window
      const COARSE_STEP_MIN = 90;       // expansion step
      const PRECISION_MIN = 1;          // final precision

      // Step A: find a future time where nakshatra != idx0
      let lo = new Date(now);
      let hi = new Date(now);

      let changed = false;
      for (let mins = COARSE_STEP_MIN; mins <= MAX_HOURS_LOOKAHEAD * 60; mins += COARSE_STEP_MIN) {
        hi = new Date(now.getTime() + mins * 60_000);
        const { idx } = await fetchNakshatraAt(hi, lat, lon);
        if (idx !== idx0) {
          changed = true;
          break;
        }
      }
      if (!changed) return null;

      // Step B: binary search between lo (same) and hi (changed)
      while ((hi - lo) > (PRECISION_MIN * 60_000)) {
        const mid = new Date((lo.getTime() + hi.getTime()) / 2);
        const { idx } = await fetchNakshatraAt(mid, lat, lon);
        if (idx === idx0) lo = mid;
        else hi = mid;
      }

      // hi is the first moment (approx) when nakshatra differs => end is around hi
      return hi;
    }

    // App state
    let currentStarIndex = null;
    let currentFix = null;
    let currentEndTime = null;

    function renderStar() {
      const starEl = document.getElementById("todayStarDisplay");
      const metaEl = document.getElementById("metaDisplay");
      const endEl  = document.getElementById("endDisplay");

      if (currentStarIndex == null) {
        starEl.innerText = "Unavailable";
        metaEl.innerText = "";
        endEl.innerText = "";
        return;
      }

      starEl.innerText = nakshatras[currentStarIndex];

      const locText = currentFix
        ? (currentFix.fallback
            ? `Location: ${currentFix.label} (fallback)`
            : `Location: ${currentFix.lat.toFixed(4)}, ${currentFix.lon.toFixed(4)}${currentFix.acc ? ` (±${Math.round(currentFix.acc)}m)` : ""}`)
        : "";

      metaEl.innerText = `${prettyNow(new Date())} • ${locText}`;

      if (currentEndTime) {
        endEl.innerText = `Valid until: ${prettyNow(currentEndTime)}`;
      } else {
        endEl.innerText = "";
      }
    }

    async function refreshStarAndEndTime({ computeEnd = true } = {}) {
      setStatus("live", "Getting your location & sky data...");
      currentStarIndex = null;
      currentEndTime = null;
      renderStar();

      try {
        const now = new Date();
        currentFix = await getUserLocation();

        const { idx } = await fetchNakshatraAt(now, currentFix.lat, currentFix.lon);
        currentStarIndex = idx;
        renderStar();

        setStatus(
          currentFix.fallback ? "warn" : "live",
          currentFix.fallback ? "✓ Updated using Ujjain fallback" : "✓ Updated using your location"
        );

        if (computeEnd) {
          setStatus(
            currentFix.fallback ? "warn" : "live",
            (currentFix.fallback ? "✓ Updated (Ujjain fallback). " : "✓ Updated (your location). ") + "Calculating end time..."
          );

          const endTime = await computeNakshatraEndTime(now, currentFix.lat, currentFix.lon, currentStarIndex);
          currentEndTime = endTime; // can be null if not found (unlikely)
          renderStar();

          setStatus(
            currentFix.fallback ? "warn" : "live",
            currentFix.fallback ? "✓ Sky data ready (Ujjain fallback)" : "✓ Sky data ready (your location)"
          );
        }
      } catch (e) {
        console.error(e);
        setStatus("err", "✖ Could not fetch Panchang data (check internet/CORS).");
        currentStarIndex = null;
        currentEndTime = null;
        renderStar();
      }
    }

    function calculateTarabalam() {
      if (currentStarIndex == null) {
        alert("Current star not available. Please refresh and try again.");
        return;
      }

      const birthStar = parseInt(select.value, 10); // 1..27
      const currentStar = currentStarIndex + 1;     // 1..27

      let diff = (currentStar - birthStar + 1);
      if (diff <= 0) diff += 27;

      const score = diff % 9; // 0..8
      const tara = taraData[score];

      const resDiv = document.getElementById('result');
      resDiv.style.display = 'block';
      resDiv.className = `result-box ${tara.type}`;
      document.getElementById('resultIcon').innerText = tara.icon;
      document.getElementById('taraName').innerText = tara.name;
      document.getElementById('taraDesc').innerText = tara.desc;
      resDiv.scrollIntoView({ behavior: 'smooth' });
    }

    // “Check now” should refresh first so it matches time-of-question
    document.getElementById("checkBtn").addEventListener("click", async () => {
      await refreshStarAndEndTime({ computeEnd: true });
      calculateTarabalam();
    });

    document.getElementById("refreshBtn").addEventListener("click", () => refreshStarAndEndTime({ computeEnd: true }));
    window.addEventListener("load", () => refreshStarAndEndTime({ computeEnd: true }));
  </script>
</body>
</html>
